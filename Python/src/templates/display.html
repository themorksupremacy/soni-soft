<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            padding: 20px;
        }

        .stat {
            margin: 5px 0;
            font-size: 24px;
        }

        .layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .left {
            width: 50%;
            padding-right: 20px;
        }

        .right {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right canvas {
            width: 100% !important;
            height: 22vh !important; /* 4 charts stacked = ~88% of screen */
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="left">
            <h1>Live Rolling Stats</h1>
            <h2>Mean</h2>
            <h2>Skew</h2>
            <h2>Standard Deviation</h2>
            <h2>Kurtosis</h2>
            <h2>Magnitude</h2>
            <div style="margin-bottom:20px;">
                <label for="delaySlider">Playback Delay:</label>
                <input type="range" id="delaySlider" min="0.01" max="1.0" step="0.01" value="0.5">
                <span id="delayValue">0.5</span>
            </div>
        </div>

        <div class="right">
            <canvas id="meanChart"></canvas>
            <canvas id="skewChart"></canvas>
            <canvas id="stdChart"></canvas>
            <canvas id="kurtChart"></canvas>
            <canvas id="magChart"></canvas>
        </div>
    </div>


    <script>
        function createChart(canvasId, label, color, xAxis) {
            return new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        borderWidth: 2,
                        tension: 0.2,
                        pointRadius: 0
                    }]
                },
                options: {
                    animation: false,
                    responsive: true,
                    scales: {
                        x: {
                            display: xAxis,
                            title: xAxis ? { display: true, text: "Time" } : undefined
                        },
                        y: {
                            title: { display: true, text: label }
                        }
                    }
                }
            });
        }

        const meanChart = createChart("meanChart", "Mean", "lime", false);
        const skewChart = createChart("skewChart", "Skew", "cyan", false);
        const stdChart = createChart("stdChart", "Std", "orange", false);
        const kurtChart = createChart("kurtChart", "Kurtosis", "magenta", false);
        const magChart = createChart("magChart", "Magnitude", "lime", true);
    </script>

    <script>
        const socket = io();

        let t = 0;

        function updateChart(chart, value) {

            chart.data.labels.push(t);
            chart.data.datasets[0].data.push(value);

            if (chart.data.labels.length > 100) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update();
        }

        socket.on('rolling_stats', function (stats) {

            updateChart(meanChart, stats.mean);
            updateChart(skewChart, stats.skew);
            updateChart(stdChart, stats.std);
            updateChart(kurtChart, stats.kurtosis);
            updateChart(magChart, stats.magnitude)

            t++;
        });

        const delaySlider = document.getElementById("delaySlider");
        const delayValue = document.getElementById("delayValue");

        delaySlider.addEventListener("input", function () {

            delayValue.textContent = this.value;

            socket.emit("update_delay", {
                delay: parseFloat(this.value)
            });

        });

    </script>
</body>

</html>
