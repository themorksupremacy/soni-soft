<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Grid layout: two columns */
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Left column: control panel + 2 charts stacked */
        .left {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 5px;
        }

        /* Control panel styling */
        .control-panel {
            padding: 10px;
            background: #111;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        /* Right column: 3 charts stacked */
        .right {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="left">
            <div class="control-panel">
                <h2>Control Panel</h2>
                <div>
                    <label for="delaySlider">Playback Delay:</label>
                    <input type="range" id="delaySlider" min="0.01" max="1.0" step="0.01" value="{{ delay }}">
                    <span id="delayValue">{{ delay }}</span>
                </div>
                <div>
                    <button id="btnStop">Stop Sonification</button>
                </div>
            </div>
            <canvas id="kurtChart"></canvas>
            
            <canvas id="magChart"></canvas>
        </div>

        <div class="right">
            <canvas id="skewChart"></canvas>
            <canvas id="stdChart"></canvas>
            <canvas id="meanChart"></canvas>
        </div>
    </div>

    <script>
        function createChart(canvasId, label, color, xAxis, yMin, yMax) {
            return new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        borderWidth: 2,
                        tension: 0.2,
                        pointRadius: 0
                    }]
                },
                options: {
                    animation: false,
                    responsive: true,
                    scales: {
                        x: {
                            display: xAxis,
                            title: xAxis ? { display: true, text: "Time" } : undefined
                        },
                        y: {
                            title: { display: true, text: label },
                            min: yMin, // will be set dynamically
                            max: yMax
                        }
                    }
                }
            });
        }

        const meanChart = createChart("meanChart", "Mean", "lime", false, 50, 105);
        const skewChart = createChart("skewChart", "Skew", "cyan", false, -1, 1);
        const stdChart = createChart("stdChart", "Std", "orange", false, 50, 127);
        const kurtChart = createChart("kurtChart", "Kurtosis", "magenta", false, 50, 300);
        const magChart = createChart("magChart", "Magnitude", "lime", true, 0, 1);

        const charts = [meanChart, skewChart, stdChart, kurtChart, magChart];

        const socket = io();
        let t = 0;

        function updateChart(chart, value) {
            chart.data.labels.push(t);
            chart.data.datasets[0].data.push(value);

            if (chart.data.labels.length > 100) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update();
        }

        socket.on('rolling_stats', function (stats) {
            updateChart(meanChart, stats.mean);
            updateChart(skewChart, stats.skew);
            updateChart(stdChart, stats.std);
            updateChart(kurtChart, stats.kurtosis);
            updateChart(magChart, stats.magnitude);
            t++;
        });

        const delaySlider = document.getElementById("delaySlider");
        const delayValue = document.getElementById("delayValue");

        delaySlider.addEventListener("input", function () {
            delayValue.textContent = this.value;
            socket.emit("update_delay", { delay: parseFloat(this.value) });
        });

        const btnStop = document.getElementById("btnStop");
        btnStop.addEventListener("click", function() {
            socket.emit("stop_sonification");
        });
    </script>
</body>
</html>
